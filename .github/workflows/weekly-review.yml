# 毎週金曜18:00 JSTに週次レビューを自動生成する(Layer 3: Always-On)
# 認証: claude setup-token で生成したトークンを Secrets の CLAUDE_CODE_OAUTH_TOKEN に登録すること
name: weekly-review

on:
  schedule:
    - cron: "0 9 * * 5" # 9:00 UTC = 18:00 JST 金曜
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 週次レビューはgit履歴を集計に使う

      - name: gitユーザー設定
        run: |
          git config user.name "brain-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: 週次レビューを生成
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/weekly-review"
          claude_args: "--model sonnet --permission-mode bypassPermissions"

      - name: 結果をプッシュ(コマンド側のpushが失敗していた場合の保険)
        run: git push origin HEAD:main || echo "プッシュ済みまたは変更なし"
